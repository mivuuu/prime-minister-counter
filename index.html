<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Счётчик высеров Гросса</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.0.0/dist/umd/supabase.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0a;
  color: rgba(255, 255, 255, 0.9);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.container {
  width: 100%;
  max-width: 560px;
  padding: 1.5rem;
}

.card {
  background: rgba(255, 255, 255, 0.04);
  backdrop-filter: blur(80px) saturate(1.2);
  -webkit-backdrop-filter: blur(80px) saturate(1.2);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 24px;
  padding: 2.5rem 2rem;
  box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
}

.label {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  color: rgba(255, 255, 255, 0.3);
  text-align: center;
  margin-bottom: 1.75rem;
  text-transform: uppercase;
  user-select: none;
  line-height: 1.3;
  max-width: 90%;
  margin-left: auto;
  margin-right: auto;
}

.counter {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
  perspective: 800px;
}

.digit-cell {
  position: relative;
  width: 88px;
  height: 112px;
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.06);
  box-shadow:
    0 2px 12px rgba(0, 0, 0, 0.3),
    inset 0 1px 0 rgba(255, 255, 255, 0.06);
  overflow: hidden;
  transition: border-color 0.3s ease;
}

.digit-cell.active {
  border-color: rgba(0, 122, 255, 0.25);
  box-shadow:
    0 2px 12px rgba(0, 0, 0, 0.3),
    0 0 20px rgba(0, 122, 255, 0.06),
    inset 0 1px 0 rgba(255, 255, 255, 0.06);
}

.digit-cell .divider {
  position: absolute;
  left: 0; right: 0;
  top: 50%;
  height: 1px;
  background: rgba(255, 255, 255, 0.04);
  z-index: 2;
  pointer-events: none;
}

.digit {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'SF Mono', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', monospace;
  font-size: 3.75rem;
  font-weight: 300;
  line-height: 1;
  color: rgba(255, 255, 255, 0.92);
  letter-spacing: -0.02em;
  user-select: none;
}

.digit-old {
  animation: slideUpOut 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

.digit-new {
  animation: slideUpIn 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

@keyframes slideUpOut {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-100%); opacity: 0; }
}

@keyframes slideUpIn {
  from { transform: translateY(100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.status {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  margin-bottom: 0.25rem;
}

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #ff3b30;
  display: inline-block;
  transition: all 0.4s ease;
}

.dot.connected {
  background: #34c759;
}

.dot.connecting {
  background: #ff9f0a;
  animation: pulse 1s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.status-text {
  font-size: 0.7rem;
  font-weight: 400;
  color: rgba(255, 255, 255, 0.25);
  letter-spacing: 0.05em;
  font-family: 'SF Mono', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', monospace;
}

.last-update {
  text-align: center;
  font-size: 0.6rem;
  font-weight: 400;
  color: rgba(255, 255, 255, 0.12);
  margin-top: 0.15rem;
  font-variant-numeric: tabular-nums;
  font-family: 'SF Mono', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', monospace;
}

@media (max-width: 600px) {
  body { touch-action: none; }
  .container { padding: 0.5rem; }
  .card { padding: 1.5rem 0.75rem; border-radius: 20px; }
  .label { font-size: 0.5rem; margin-bottom: 1rem; max-width: 95%; }
  .counter { gap: 0.35rem; margin-bottom: 1rem; }
  .digit-cell { width: 56px; height: 74px; border-radius: 12px; }
  .digit { font-size: 2.5rem; }
}

@media (max-width: 380px) {
  .label { font-size: 0.45rem; }
  .card { padding: 1rem 0.5rem; border-radius: 16px; }
  .digit-cell { width: 44px; height: 58px; border-radius: 10px; }
  .digit { font-size: 1.75rem; }
  .counter { gap: 0.25rem; }
}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="label" id="label">Столько раз высрался гроссцийский мудак</div>

    <div class="counter" id="counter"></div>

    <div class="status">
      <span class="dot" id="dot"></span>
      <span class="status-text" id="status-text">Connecting</span>
    </div>
    <div class="last-update" id="last-update"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://wnsaumdxenokulbpzckv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Induc2F1bWR4ZW5va3VsYnB6Y2t2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMDAzMTgsImV4cCI6MjA5ODc3NjMxOH0.APbc63eb6cbyTfSpx3yoCi0hosDaNBMnWBPawloSHx8';
const COUNTER_ID = 'ПМ-Гросса';
const MIN_DIGITS = 4;

const { createClient } = supabase;
const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const counterEl = document.getElementById('counter');
const labelEl = document.getElementById('label');
const dotEl = document.getElementById('dot');
const statusText = document.getElementById('status-text');
const lastUpdateEl = document.getElementById('last-update');

let cells = [];

function setStatus(state) {
  dotEl.className = 'dot';
  if (state === 'connected') {
    dotEl.classList.add('connected');
    statusText.textContent = 'Connected';
  } else if (state === 'connecting') {
    dotEl.classList.add('connecting');
    statusText.textContent = 'Connecting...';
  } else {
    statusText.textContent = 'Disconnected';
  }
}

function buildCells(count) {
  counterEl.innerHTML = '';
  cells = [];
  for (let i = 0; i < count; i++) {
    const cell = document.createElement('div');
    cell.className = 'digit-cell';

    const digit = document.createElement('span');
    digit.className = 'digit';
    digit.textContent = '0';

    const divider = document.createElement('div');
    divider.className = 'divider';

    cell.appendChild(digit);
    cell.appendChild(divider);
    counterEl.appendChild(cell);
    cells.push({ cell, digit, val: 0 });
  }
}

function pad(n, len) {
  return String(n).padStart(len, '0');
}

function updateCounter(value) {
  const str = pad(value, Math.max(MIN_DIGITS, String(value).length));

  if (cells.length !== str.length) {
    buildCells(str.length);
  }

  for (let i = 0; i < str.length; i++) {
    const d = str[i];
    const c = cells[i];
    if (String(c.val) !== d) {
      const oldEl = c.cell.querySelector('.digit');
      const divider = c.cell.querySelector('.divider');

      const newEl = document.createElement('span');
      newEl.className = 'digit digit-new';
      newEl.textContent = d;

      oldEl.classList.remove('digit');
      oldEl.classList.add('digit', 'digit-old');

      c.cell.insertBefore(newEl, divider);

      c.cell.classList.remove('active');
      void newEl.offsetWidth;
      c.cell.classList.add('active');

      setTimeout(() => {
        oldEl.remove();
        newEl.classList.remove('digit-new');
      }, 400);

      c.val = d;
    }
  }
}

function updateDisplay(data) {
  if (!data) return;
  updateCounter(data.value ?? 0);
  if (data.updated_at) {
    lastUpdateEl.textContent = new Date(data.updated_at).toLocaleString('ru-RU', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
  }
}

async function loadInitial() {
  try {
    const { data, error } = await client
      .from('counters')
      .select('*')
      .eq('id', COUNTER_ID)
      .single();

    if (error && error.code !== 'PGRST116') console.error('Load error:', error);

    buildCells(MIN_DIGITS);
    if (data) {
      updateDisplay(data);
    }
  } catch (err) {
    console.error('Load error:', err);
    buildCells(MIN_DIGITS);
  }
}

setStatus('connecting');

client
  .channel('counters-realtime')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'counters' }, (payload) => {
    if (payload.new && payload.new.id === COUNTER_ID) updateDisplay(payload.new);
  })
  .subscribe((status) => {
    if (status === 'SUBSCRIBED') setStatus('connected');
  });

loadInitial();
</script>
</body>
</html>
